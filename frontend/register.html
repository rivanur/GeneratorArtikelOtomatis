<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - ARSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Set theme based on app settings or system preference
        const savedTheme = localStorage.getItem('app_theme') || 'system';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <style>
        :root {
            --primary: #2F5C4B;
            --primary-hover: #24473a;
            --bg-color: #0f111a;
            --panel-bg: #191c29;
            --text-main: #f0f2f5;
            --text-muted: #9aa0a6;
            --border-color: #2a2d3d;
        }

        :root[data-theme="light"] {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem; /* Added 1rem horizontal padding for mobile */
        }

        .login-container {
            background: var(--panel-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .logo svg {
            color: var(--primary);
            stroke-width: 3;
            filter: drop-shadow(0 0 8px rgba(47, 92, 75, 0.4));
        }

        .brand-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        .brand-name .highlight {
            color: var(--primary);
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(90deg, #2F5C4B, #24473a);
            color: white;
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(47, 92, 75, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before {
            margin-right: .25em;
        }

        .divider:not(:empty)::after {
            margin-left: .25em;
        }

        .btn-google {
            width: 100%;
            background: white;
            color: #3c4043;
            padding: 0.8rem;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: background 0.2s;
        }

        .btn-google:not(.disabled):hover {
            background: #f8f9fa;
        }

        .btn-google.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #f1f3f4;
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .footer-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.25rem;
            }
            .brand-name {
                font-size: 1.4rem;
            }
            .form-control {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <a href="index.html" class="logo">
            <img src="arsa-logo-horizontal.png" alt="ARSA Logo" height="75" style="object-fit: contain; transform: scale(1.8); transform-origin: center center;">
        </a>

        <h1 data-i18n="auth_title_register">Buat Akun Baru</h1>
        <p class="subtitle" data-i18n="auth_subtitle_register">Bergabunglah dan mulai buat artikel dengan ARSA</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="name" data-i18n="auth_label_name">Nama Lengkap</label>
                <input type="text" id="name" class="form-control" placeholder="Nama Anda" data-i18n="contact_ph_name" required>
            </div>
            <div class="form-group">
                <label for="email" data-i18n="auth_label_email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="nama@email.com" data-i18n="contact_ph_email" required>
            </div>
            <div class="form-group">
                <label for="password" data-i18n="auth_label_pwd">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Buat kata sandi" required>
            </div>
            <button type="submit" class="btn-primary" data-i18n="auth_btn_register">Daftar Sekarang</button>
        </form>

        <!-- <div class="divider">atau daftar dengan</div>

        <button type="button" class="btn-google disabled"
            onclick="alert('Fitur Daftar dengan Google saat ini sedang dalam tahap pengembangan dan belum tersedia.')">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo">
            Daftar dengan Google (Segera Hadir)
        </button> -->

        <p class="footer-link"><a href="login.html" data-i18n="auth_link_login">Sudah punya akun? Masuk di sini</a></p>
    </div>

    <script>
        // [PENTING] URL Otak/Backend Render kita
        const CLOUD_BACKEND_URL = 'https://generatorartikelotomatis.onrender.com';
        const API_BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port === '5500' ? 'http://localhost:8000' : CLOUD_BACKEND_URL;

        // Bouncer: Cek memori, kalau sudah login, langsung usir kembali ke Dashboard!
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('ARSA_logged_in') === 'true' && localStorage.getItem('ARSA_token')) {
                window.location.replace('app.html');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // Mencegah reload halaman

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.querySelector('.btn-primary');

            submitBtn.disabled = true;

            try {
                const response = await fetch(API_BASE_URL + '/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message || 'Pendaftaran berhasil!\nSilakan periksa email Anda untuk verifikasi.');
                    window.location.href = 'login.html';
                } else {
                    alert('Gagal mendaftar: ' + (data.detail || 'Terjadi kesalahan'));
                    submitBtn.textContent = 'Daftar Sekarang';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                alert('Tidak dapat terhubung ke server backend (Pastikan backend berjalan).');
                submitBtn.textContent = 'Daftar Sekarang';
                submitBtn.disabled = false;
            }
        });
    </script>
    <script src="lang.js?v=1"></script>
</body>

</html>
